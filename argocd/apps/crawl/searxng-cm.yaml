apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-settings
  namespace: crawl
data:
  settings.yml: |
    use_default_settings: true
    general:
      instance_name: "hermes-searxng"
      debug: false
    server:
      bind_address: "0.0.0.0"
      port: 8080
      secret_key: "__SEARXNG_SECRET__"    # placeholder, substituted at runtime
      limiter: false
      public_instance: false
      image_proxy: false
    search:
      safe_search: 0
      formats:
        - html
        - json
    ui:
      static_use_hash: true