apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vmks
  namespace: argocd
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: vm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: vmks-victoria-metrics-operator-validation
      namespace: vm
      jsonPointers:
        - /data
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: vmks-victoria-metrics-operator-admission
      jqPathExpressions:
      - '.webhooks[]?.clientConfig.caBundle'
  source:
    chart: victoria-metrics-k8s-stack
    repoURL: https://victoriametrics.github.io/helm-charts
    targetRevision: 0.72.5
    helm:
      releaseName: vmks
      valuesObject:
        victoria-metrics-operator:
          enabled: true
          operator:
            disable_prometheus_converter: false
            enable_converter_ownership: true

        grafana:
          enabled: false

        defaultDashboards:
          enabled: true
          labels:
            grafana_dashboard: "1"
          annotations:
            argocd.argoproj.io/sync-options: ServerSideApply=true

        vmsingle:
          enabled: false

        vmcluster:
          enabled: true
          spec:
            retentionPeriod: "14"
            # keep single-replica cluster because of existing RWO PVCs
            replicationFactor: 1
            vmstorage:
              replicaCount: 1
              storage:
                volumeClaimTemplate:
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 50Gi
            vmselect:
              enabled: true
              replicaCount: 1
            vminsert:
              enabled: true
              replicaCount: 1

        vmagent:
          enabled: true
          spec:
            scrapeInterval: 30s
            hostNetwork: true
            dnsPolicy: ClusterFirstWithHostNet
            resources:
              requests:
                cpu: "1"           # Integer CPU units — Go runtime performs better with whole cores [web:43]
                memory: "512Mi"
              limits:
                cpu: "2"
                memory: "1Gi"
            extraArgs:
              memory.allowedBytes: "900MB"
              promscrape.maxScrapeSize: "64MB"
              promscrape.noStaleMarkers: "true"
            extraEnvs:
              - name: GOGC
                value: "100"
              - name: GOMAXPROCS
                value: "2"

        kubeControllerManager:
          enabled: true
          endpoints:
            - 127.0.0.1
          service:
            enabled: true
            port: 10257
            targetPort: 10257
            selector:
              component: kube-controller-manager
          vmScrape:
            spec:
              jobLabel: jobLabel
              namespaceSelector:
                matchNames:
                  - kube-system
              endpoints:
                - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
                  port: http-metrics
                  scheme: https
                  tlsConfig:
                    caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                    insecureSkipVerify: true
                  relabelConfigs:
                    - sourceLabels: [__address__]
                      targetLabel: __address__
                      replacement: 127.0.0.1:10257

        kubeScheduler:
          enabled: true
          endpoints:
            - 127.0.0.1
          service:
            enabled: true
            port: 10259
            targetPort: 10259
            selector:
              component: kube-scheduler
          vmScrape:
            spec:
              jobLabel: jobLabel
              namespaceSelector:
                matchNames:
                  - kube-system
              endpoints:
                - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
                  port: http-metrics
                  scheme: https
                  tlsConfig:
                    caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                    insecureSkipVerify: true
                  relabelConfigs:
                    - sourceLabels: [__address__]
                      targetLabel: __address__
                      replacement: 127.0.0.1:10259

        kubeEtcd:
          enabled: true
          endpoints:
            - 127.0.0.1
          service:
            enabled: true
            port: 2381
            targetPort: 2381
            selector:
              component: etcd
          vmScrape:
            spec:
              jobLabel: jobLabel
              namespaceSelector:
                matchNames:
                  - kube-system
              endpoints:
                - port: http-metrics
                  scheme: http
                  relabelConfigs:
                    - sourceLabels: [__address__]
                      targetLabel: __address__
                      replacement: 127.0.0.1:2381

        kubeProxy:
          enabled: true

        kubelet:
          enabled: true
          vmScrape:
            kind: VMNodeScrape
            spec:
              scheme: https
              honorLabels: true
              honorTimestamps: false
              interval: 30s
              scrapeTimeout: 5s
              bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              tlsConfig:
                caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecureSkipVerify: true
              relabelConfigs:
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)
                - sourceLabels: [__meta_kubernetes_node_name]
                  targetLabel: node                        # ← THIS is what was missing
                - sourceLabels: [__metrics_path__]
                  targetLabel: metrics_path
                - replacement: kubelet
                  targetLabel: job
              metricRelabelConfigs:
                - action: labeldrop
                  regex: (uid)
                - action: labeldrop
                  regex: (id|name)
                - action: drop
                  sourceLabels: [__name__]
                  regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)
              vmScrapes:
                cadvisor:
                  enabled: true
                  spec:
                    path: /metrics/cadvisor
                kubelet:
                  spec: {}
                probes:
                  enabled: true
                  spec:
                    path: /metrics/probes
                resources:
                  enabled: true
                  spec:
                    path: /metrics/resource
