# pvc.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-webui-data
  namespace: agents
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-webui
  namespace: agents
  labels:
    app: hermes-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-webui
  template:
    metadata:
      labels:
        app: hermes-webui
    spec:
      securityContext:
        fsGroup: 1024        # matches hermeswebui GID baked into the image
      containers:
        - name: hermes-webui
          image: ghcr.io/nesquena/hermes-webui:v0.51.374
          securityContext:
            allowPrivilegeEscalation: true   # required: docker_init.bash uses sudo
          ports:
            - containerPort: 8787
          env:
            - name: WANTED_UID
              value: "1024"
            - name: WANTED_GID
              value: "1024"
            - name: HERMES_WEBUI_STATE_DIR
              value: /home/hermeswebui/.hermes/webui
            - name: HERMES_WEBUI_DEFAULT_WORKSPACE
              value: /workspace
            - name: HERMES_WEBUI_CHAT_BACKEND
              value: gateway
            - name: HERMES_WEBUI_GATEWAY_BASE_URL
              value: http://hermes.agents.svc.cluster.local:8642
            - name: HERMES_WEBUI_GATEWAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-webui-secrets
                  key: gateway-api-key
            - name: HERMES_WEBUI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-webui-secrets
                  key: webui-password
          volumeMounts:
            - name: data
              mountPath: /home/hermeswebui/.hermes
              subPath: hermes
            - name: data
              mountPath: /workspace
              subPath: workspace
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet: { path: /health, port: 8787 }
            failureThreshold: 20
            periodSeconds: 10   # allows ~3min for first-boot uv/pip install
          readinessProbe:
            httpGet: { path: /health, port: 8787 }
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /health, port: 8787 }
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-webui-data
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: hermes-webui-secrets
  namespace: agents
spec:
  encryptedData:
    gateway-api-key: 
    webui-password: 
  template:
    metadata:
      creationTimestamp: null
      name: hermes-webui-secrets
      namespace: agents
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-webui
  namespace: agents
spec:
  type: ClusterIP
  selector:
    app: hermes-webui
  ports:
    - name: http
      port: 8787
      targetPort: 8787
---
# ingress-tailscale.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hermes-webui
  namespace: agents
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: hermes-webui
      port:
        number: 8787
  tls:
    - hosts:
        - hermes-webui   # MagicDNS name: hermes-webui.<tailnet>.ts.net
---
# networkpolicy.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-webui
  namespace: agents
spec:
  podSelector:
    matchLabels:
      app: hermes-webui
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from: []
      ports: [{ port: 8787, protocol: TCP }]
  egress:
    - to: []
      ports: [{ port: 53, protocol: UDP }, { port: 53, protocol: TCP }]
    - to:
        - podSelector: {}   # in-namespace only, for the hermes Service
      ports: [{ port: 8642, protocol: TCP }]
    - to: []                # pypi/astral.sh on cold start
      ports: [{ port: 443, protocol: TCP }]