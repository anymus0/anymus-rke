apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: hermes
  namespace: agents
spec:
  runStrategy: Always    # equivalent to Deployment restartPolicy: Always
  template:
    metadata:
      labels:
        app: hermes
    spec:
      domain:
        cpu:
          cores: 4
          sockets: 1
          threads: 1
        memory:
          guest: 6Gi
        resources:
          requests:
            memory: 6Gi
        devices:
          interfaces:
            - name: default
              masquerade: {}
              macAddress: "d6:a0:5b:21:dc:43"
          disks:
          - name: rootdisk
            disk:
              bus: virtio
          - name: cloudinit
            disk:
              bus: virtio
          - name: hermes-data
            serial: hermesdata          # → /dev/disk/by-id/virtio-hermesdata
            disk:
              bus: virtio
          interfaces:
          - name: default
            masquerade: {}   # NAT through pod network; no macvlan needed
        machine:
          type: q35
      nodeSelector:
        kubernetes.io/hostname: anymus-rke03
      networks:
      - name: default
        pod: {}
      volumes:
        - name: rootdisk
          dataVolume:
            name: hermes-root
        - name: cloudinit
          cloudInitNoCloud:
            secretRef:
              name: hermes-cloudinit   # references the cloud-init SealedSecret
        - name: hermes-data
          persistentVolumeClaim:
            claimName: hermes-session-data

  dataVolumeTemplates:
  - metadata:
      name: hermes-root
    spec:
      storage:
        storageClassName: longhorn-vm
        volumeMode: Filesystem         # Block mode requires CDI privileged importer — dropped in newer CDI; Filesystem works fine for this workload
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 20Gi
      source:
        http:
          url: https://cloud-images.ubuntu.com/resolute/current/resolute-server-cloudimg-amd64.img
          # CDI will import this image into the Longhorn block PVC
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-session-data
  namespace: agents
  labels:
    recurring-job.longhorn.io/source: enabled                 # sync PVC labels → Volume
    recurring-job-group.longhorn.io/hermes-snap: enabled      # assign to group
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources: { requests: { storage: 15Gi } }
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: hermes-session-snap
  namespace: longhorn-system
spec:
  task: snapshot
  cron: "0 */6 * * *"
  retain: 4
  concurrency: 1
  groups: [hermes-snap]