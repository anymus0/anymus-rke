apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-ingress-egress
  namespace: agents
spec:
  podSelector:
    matchLabels:
      app: openclaw
  policyTypes:
  - Ingress
  - Egress

  ingress:
    # Allow SSH from Jenkins only — nothing else from the pod network
    - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: jenkins
        podSelector:
          matchLabels:
            pipeline: openclaw
      ports:
      - protocol: TCP
        port: 22

  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 10.0.0.0/8       # pod network (10.42.x.x) + cluster services (10.43.x.x)
        - 172.16.0.0/12    # docker/other bridge ranges
        - 192.168.0.0/16   # physical LAN