apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-dashboard-nginx-conf
  namespace: agents
data:
  default.conf: |
    server {
      listen 8080;
      location / {
        proxy_pass http://hermes.agents.svc.cluster.local:9119;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-dashboard-nginx
  namespace: agents
spec:
  replicas: 1
  selector:
    matchLabels: {app: hermes-dashboard-nginx}
  template:
    metadata:
      labels: {app: hermes-dashboard-nginx}
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports: [{containerPort: 8080}]
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests: {cpu: 25m, memory: 32Mi}
            limits: {cpu: 100m, memory: 64Mi}
      volumes:
        - name: conf
          configMap: {name: hermes-dashboard-nginx-conf}
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-dashboard-nginx
  namespace: agents
spec:
  selector: {app: hermes-dashboard-nginx}
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hermes-dashboard
  namespace: agents
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    tailscale.com/proxy-group: ingress-proxies
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: hermes-dashboard-nginx
      port: {number: 80}
  tls:
    - hosts: ["hermes-dashboard"]