# k8s/tei/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tei
  namespace: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tei
  template:
    metadata:
      labels:
        app: tei
    spec:
      containers:
        - name: tei
          # cpu-1.9 is the latest CPU-only image tag — no GPU needed
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
          args:
            - --model-id
            - sentence-transformers/all-MiniLM-L6-v2
            - --port
            - "80"
          ports:
            - containerPort: 80
          # Model downloads from HuggingFace Hub on first boot (~600MB).
          # Persisted to the volume so subsequent restarts are instant.
          volumeMounts:
            - name: model-cache
              mountPath: /data
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 60   # first boot downloads the model
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 120
            periodSeconds: 30
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: tei-model-cache
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tei-model-cache
  namespace: agents
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
# k8s/tei/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: tei
  namespace: agents
spec:
  selector:
    app: tei
  ports:
    - port: 80
      targetPort: 80
---
# k8s/tei/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tei
  namespace: agents
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    tailscale.com/proxy-group: ingress-proxies
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: tei
      port:
        number: 80
  tls:
    - hosts:
        - tei                 # → tei.icefish-pickerel.ts.net