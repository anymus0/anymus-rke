apiVersion: v1
kind: Service
metadata:
  name: hermes
  namespace: agents
spec:
  selector:
    # Match the label which KubeVirt VMI pod carries.
    vm.kubevirt.io/name: hermes
  ports:
    - name: api
      port: 8642
      targetPort: 8642
      protocol: TCP
    - name: dashboard
      port: 9119
      targetPort: 9119
    - name: webui
      port: 8787
      protocol: TCP
      targetPort: 8787
  type: ClusterIP