apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: ghcr.io/berriai            # OCI registry + org (no oci:// prefix on recent ArgoCD)
    chart: litellm-helm
    targetRevision: "1.90.3"            # latest: helm show chart oci://ghcr.io/berriai/litellm-helm
    helm:
      releaseName: litellm
      valuesObject:
        fullnameOverride: litellm

        image:
          repository: ghcr.io/berriai/litellm-database   # keep DB image (bundles prisma) — required for external PG

        # ── External Postgres ──
        db:
          useExisting: true
          deployStandalone: false       # disable Bitnami postgres subchart
          endpoint: litellm-cnpg-cluster-rw.litellm.svc.cluster.local
          database: litellm
          secret:
            name: litellm-cnpg-initdb-credentials
            usernameKey: username
            passwordKey: password

        # ── External Redis (operator-managed, same ns) ──
        redis:
          enabled: false                # do NOT deploy Bitnami redis; also skips its env wiring
        # envVars:
        #   REDIS_HOST: redis-ha-litellm.litellm.svc.cluster.local
        #   REDIS_PORT: "26379"
        # extraEnvVars:
        #   - name: REDIS_PASSWORD
        #     valueFrom:
        #       secretKeyRef:
        #         name: litellm-redis-secret
        #         key: password

        # ── Provider API keys (GLM + future cloud models) via envFrom ──
        environmentSecrets:
          - litellm-provider-keys       # holds GLM_API_KEY (referenced as os.environ/GLM_API_KEY below)
          - litellm-ui-auth

        # ── Master key from pre-created secret ──
        masterkeySecretName: litellm-masterkey
        masterkeySecretKey: masterkey

        migrationJob:
          hooks:
            argocd:
              enabled: true
            helm:
              enabled: false

        # ── Proxy config (rendered into the config.yaml ConfigMap) ──
        proxyConfigMap:
          create: true
        proxy_config:
          general_settings:
            master_key: os.environ/PROXY_MASTER_KEY
            disable_master_key_return: true
            store_model_in_db: true
            store_prompts_in_spend_logs: true
          litellm_settings:
            cache: false
            cache_params:
              type: redis
              host: os.environ/REDIS_HOST
              port: os.environ/REDIS_PORT
              password: os.environ/REDIS_PASSWORD
            upperbound_key_generate_params:
              max_budget: 50
              budget_duration: "30d"
          model_list:
            - model_name: glm-5.2
              litellm_params:
                model: openai/glm-5.2
                api_base: https://api.z.ai/api/paas/v4
                api_key: os.environ/GLM_API_KEY
                input_cost_per_token: 0.0000014
                output_cost_per_token: 0.0000044
              model_info:
                cache_read_input_token_cost: 0.00000026   # the $0.26/M cached rate
            # - model_name: glm-4.7-flash
            #   litellm_params:
            #     model: openai/glm-4.7-flash
            #     api_base: https://api.z.ai/api/paas/v4
            #     api_key: os.environ/GLM_API_KEY
            # - model_name: glm-4.5-flash
            #   litellm_params:
            #     model: openai/glm-4.5-flash
            #     api_base: https://api.z.ai/api/paas/v4
            #     api_key: os.environ/GLM_API_KEY

  destination:
    server: https://kubernetes.default.svc
    namespace: litellm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
